name: Build Unsigned iOS App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# Grant write permissions to create the release and upload assets
permissions:
  contents: write

jobs:
  build_unsigned_ipa:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Install dependencies
        run: npm ci

      - name: Generate Native iOS Directories (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Compile Unsigned Binary using xcodebuild
        run: |
          # Resolve the target workspace path
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n 1)
          
          # Force target selection to match the main application project name
          SCHEME=$(basename ios/*.xcodeproj .xcodeproj)
          
          echo "Building Workspace: $WORKSPACE with Target Scheme: $SCHEME"
          
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS="" \
                     PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package .app into Unsigned .ipa Archive
        run: |
          mkdir -p Payload
          # Copy the compiled architecture binary folder to the standard payload structure
          cp -r build_output/Build/Products/Release-iphoneos/*.app Payload/
          # Compress the structure and modify extension to target mobile OS structures
          zip -r unsigned-app.ipa Payload
          
      - name: Upload Unsigned IPA Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: unsigned-app.ipa
          retention-days: 7

      # Create a Draft Release and upload the raw .ipa directly
      - name: Create GitHub Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          tag_name: build-${{ github.run_number }}
          name: "Unsigned iOS Build #${{ github.run_number }}"
          body: |
            ### Unsigned iOS Build
            This draft release contains the raw unsigned `.ipa` binary generated by GitHub Actions.
          files: unsigned-app.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}